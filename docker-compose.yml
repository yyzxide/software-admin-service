services:
  mysql:
    image: mysql:8.0
    container_name: java-software-admin-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${ADMIN_DB_PASSWORD:-root123456}
      MYSQL_DATABASE: ${ADMIN_DB_NAME:-db_java_software_admin}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    ports:
      - "${ADMIN_DB_HOST_PORT:-3308}:3306"
    volumes:
      - java_admin_mysql_data:/var/lib/mysql
      - ./database/mysql/001_init_admin_schema.sql:/docker-entrypoint-initdb.d/001_init_admin_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: java-software-admin-redis
    restart: unless-stopped
    ports:
      - "${ADMIN_REDIS_HOST_PORT:-6381}:6379"
    volumes:
      - java_admin_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  admin-service:
    profiles: ["app"]
    build:
      context: .
      dockerfile: admin-service/Dockerfile
    image: java-software-admin-service:latest
    container_name: java-software-admin-service
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      ADMIN_SERVER_PORT: ${ADMIN_SERVER_PORT:-8090}
      ADMIN_OPENAPI_SERVER_URL: ${ADMIN_OPENAPI_SERVER_URL:-http://127.0.0.1:8090}
      ADMIN_DB_HOST: mysql
      ADMIN_DB_PORT: 3306
      ADMIN_DB_NAME: ${ADMIN_DB_NAME:-db_java_software_admin}
      ADMIN_DB_USERNAME: ${ADMIN_DB_USERNAME:-root}
      ADMIN_DB_PASSWORD: ${ADMIN_DB_PASSWORD:-root123456}
      ADMIN_DB_URL: jdbc:mysql://mysql:3306/${ADMIN_DB_NAME:-db_java_software_admin}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      ADMIN_REDIS_HOST: redis
      ADMIN_REDIS_PORT: 6379
      ADMIN_REDIS_PASSWORD: ${ADMIN_REDIS_PASSWORD:-}
      ADMIN_REDIS_DATABASE: ${ADMIN_REDIS_DATABASE:-0}
      ADMIN_SECURITY_USER_ID: ${ADMIN_SECURITY_USER_ID:-1}
      ADMIN_SECURITY_USERNAME: ${ADMIN_SECURITY_USERNAME:-admin}
      ADMIN_SECURITY_PASSWORD: ${ADMIN_SECURITY_PASSWORD:-admin123456}
      ADMIN_SECURITY_PASSWORD_SHA256: ${ADMIN_SECURITY_PASSWORD_SHA256:-}
      ADMIN_SECURITY_TOKEN_SECRET: ${ADMIN_SECURITY_TOKEN_SECRET:-change-me-local-development-secret}
      ADMIN_SECURITY_TTL_SECONDS: ${ADMIN_SECURITY_TTL_SECONDS:-7200}
      ADMIN_UPLOAD_MAX_FILE_SIZE: ${ADMIN_UPLOAD_MAX_FILE_SIZE:-500MB}
      ADMIN_UPLOAD_MAX_REQUEST_SIZE: ${ADMIN_UPLOAD_MAX_REQUEST_SIZE:-600MB}
      ADMIN_UPLOAD_MAX_PACKAGE_SIZE: ${ADMIN_UPLOAD_MAX_PACKAGE_SIZE:-500MB}
      ADMIN_UPLOAD_PACKAGE_DIR: /app/admin-service/storage/packages
      ADMIN_UPLOAD_SIGNATURE_PUBLIC_KEY_PEM: ${ADMIN_UPLOAD_SIGNATURE_PUBLIC_KEY_PEM:-}
      ADMIN_UPLOAD_CLEANUP_ENABLED: ${ADMIN_UPLOAD_CLEANUP_ENABLED:-true}
      ADMIN_UPLOAD_CLEANUP_EXPIRE_HOURS: ${ADMIN_UPLOAD_CLEANUP_EXPIRE_HOURS:-24}
    ports:
      - "${ADMIN_SERVER_PORT:-8090}:${ADMIN_SERVER_PORT:-8090}"
    volumes:
      - java_admin_package_storage:/app/admin-service/storage/packages

volumes:
  java_admin_mysql_data:
  java_admin_redis_data:
  java_admin_package_storage:
