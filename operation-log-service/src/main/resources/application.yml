server:
  port: 8089

spring:
  application:
    name: operation-log-service
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${OPERATION_LOG_DB_URL:jdbc:mysql://localhost:3306/db_notify?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${OPERATION_LOG_DB_USERNAME:root}
    password: ${OPERATION_LOG_DB_PASSWORD:root123456}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
  jackson:
    property-naming-strategy: SNAKE_CASE

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    com.xcappstore.operationlog: INFO
